name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'manifests/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/fveim/devopsproject

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update image tags in overlays
        run: |
          sed -i "s/newTag: .*/newTag: ${{ github.sha }}/" manifests/overlays/dev/kustomization.yaml
          sed -i "s/newTag: .*/newTag: ${{ github.sha }}/" manifests/overlays/prod/kustomization.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/overlays/dev/kustomization.yaml manifests/overlays/prod/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update image tag to ${{ github.sha }}"
          git push
