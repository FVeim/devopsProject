apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - ../../base

images:
  - name: sample-app
    newName: ghcr.io/fveim/devopsproject
    newTag: 80bae312df05bf4caae00c824679f32045da4648

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: dev
    target:
      kind: Deployment
      name: sample-app
