apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - ../../base

images:
  - name: sample-app
    newName: ghcr.io/fveim/devopsproject
    newTag: 632ce230517759394a08337cd7ecafb50a5683d7

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: dev
    target:
      kind: Deployment
      name: sample-app
